<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>泪叶丝的个人博客</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    body {
      background-image: url('assets/1.png') !important;
      background-attachment: fixed !important;
      background-repeat: no-repeat !important;
      background-size: cover !important;
      background-position: center !important;
      transition: background 0.5s ease;
    }

    section.cover {
      background: rgba(255, 255, 255, 0.4) !important; /* 调整这里的数值可以改变深浅 */
      height: 100vh;
      display: flex !important;
    }

    /* 进入正文后的样式 */
    main, .content, .sidebar { background: transparent !important; }
    
    .markdown-section {
      background: rgba(255, 255, 255, 0.85) !important;
      border-radius: 12px;
      padding: 30px !important;
      margin-top: 20px;
    }

.sidebar {
  position: fixed; 
  top: 0;
  bottom: 0;
  left: 0;
  height: 100vh; 
  overflow-y: auto; 
  z-index: 20;
}


@media screen and (min-width: 768px) {
  .content {
    padding-left: 300px;
  }
}


html {
  scroll-behavior: smooth;
}
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: 'LAYYES',
      repo: 'worldfunction4/worldfunction4.github.io',
      loadSidebar: true,
      subMaxLevel: 3,
      coverpage: true,
      // 这里的逻辑很关键
      onlyCover: true, 
      auto2top: true,
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      pagination: { previousText: '上一篇', nextText: '下一篇' },
      
      // 核心钩子：当路由改变时执行
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            // 如果不在首页路径，强制解除 onlyCover 限制并移除封面类
            if (vm.route.path !== '/') {
              document.body.classList.remove('sticky');
              // 强制显示侧边栏并允许滚动
              const cover = document.querySelector('.cover');
              if (cover) cover.style.display = 'none';
            } else {
              const cover = document.querySelector('.cover');
              if (cover) cover.style.display = 'flex';
            }
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
