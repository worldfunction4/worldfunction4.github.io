<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="泪叶丝的个人博客，分享技术、生活和思考">
  <title>泪叶丝的个人博客</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    body {
      background-image: linear-gradient(rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.6)), url('assets/1.png');
      background-attachment: fixed;
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      overflow-x: hidden;
    }

    main, .content {
      background: transparent;
    }

    section.cover {
      background: rgba(255, 255, 255, 0.2);
    }

    section.cover.has-mask .mask {
      opacity: 0;
    }

    .markdown-section {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 12px;
      padding: 30px;
      margin-top: 20px;
    }

    .sidebar {
      background-color: rgba(255, 255, 255, 0.6);
      border-right: none;
    }

    .cover-main h1, .cover-main p, .cover-main blockquote {
      color: #333;
      text-shadow: 0 1px 3px rgba(255, 255, 255, 0.8);
    }

    /* 使图片和文本自适应 */
    .markdown-section img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 20px auto;
    }

    .markdown-section p, .markdown-section li, .markdown-section blockquote {
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    @media (max-width: 768px) {
      .markdown-section {
        padding: 20px;
        margin-top: 10px;
      }
    }

    /* 封面统计样式 */
    .cover-stats {
      font-size: 0.9em;
      color: #666;
      margin-top: 30px;
      text-align: left;
      padding-left: 15px;
    }

    .cover-stats .stat-row {
      margin: 6px 0;
    }

    .cover-stats .stat-label {
      color: #888;
      margin-right: 6px;
    }

    .cover-stats .stat-value[aria-hidden="true"] {
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: 'LAYYES',
      nameLink: '/', // 确保点击左上角名字跳转回根目录
      repo: 'worldfunction4/worldfunction4.github.io',
      loadSidebar: true,
      subMaxLevel: 3,
      coverpage: true,
      onlyCover: false, 
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      pagination: {
        previousText: '上一篇',
        nextText: '下一篇',
      },
      // 插件：当路由回到首页时，确保封面正常显示
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            if (vm.route.path === '/' || vm.route.path === '/README') {
              const cover = document.querySelector('.cover');
              if (cover) cover.style.display = 'flex';
            }
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>

  <script>
    (function() {
      // 更稳健地加载 busuanzi：只有在脚本成功加载后才设置锁并展示数据
      if (!sessionStorage.getItem('busuanzi_locked')) {
        var script = document.createElement('script');
        script.async = true;
        script.src = "https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js";
        script.onload = function() {
          try {
            sessionStorage.setItem('busuanzi_locked', 'true');
            var pv = document.getElementById('busuanzi_value_site_pv');
            var uv = document.getElementById('busuanzi_value_site_uv');
            if (pv && pv.textContent && pv.textContent.trim() !== '') pv.removeAttribute('aria-hidden');
            if (uv && uv.textContent && uv.textContent.trim() !== '') uv.removeAttribute('aria-hidden');
          } catch (e) {
            console.warn('busuanzi onload handler error', e);
          }
        };
        script.onerror = function() {
          // 加载失败时记录避免无限重试
          sessionStorage.setItem('busuanzi_locked', 'failed');
          console.warn('busuanzi script failed to load');
        };
        document.body.appendChild(script);
      }
    })();
  </script>
</body>
</html>
