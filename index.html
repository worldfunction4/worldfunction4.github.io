<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>泪叶丝的个人博客</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    body {
      background-image: linear-gradient(rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.6)), url('assets/1.png') !important;
      background-attachment: fixed !important;
      background-repeat: no-repeat !important;
      background-size: cover !important;
      background-position: center !important;
      /* 恢复标准滚动行为 */
      overflow-x: hidden;
      overflow-y: auto;
    }

    main, .content, section.cover {
      background: transparent !important;
    }

    section.cover {
      background: rgba(255, 255, 255, 0.2) !important;
    }

    section.cover.has-mask .mask {
      opacity: 0 !important;
    }

    .markdown-section {
      background: rgba(255, 255, 255, 0.85) !important;
      border-radius: 12px;
      padding: 30px !important;
      margin-top: 20px;
    }

    .sidebar {
      background-color: rgba(255, 255, 255, 0.6) !important;
      border-right: none !important;
    }
    
    .sidebar .search, .search-input {
      display: none !important;
    }

    .cover-main h1, .cover-main p, .cover-main blockquote {
      color: #333 !important;
      text-shadow: 0 1px 3px rgba(255,255,255,0.8);
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: 'LAYYES',
      repo: 'worldfunction4/worldfunction4.github.io',
      loadSidebar: true,
      subMaxLevel: 3,
      coverpage: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      pagination: {
        previousText: '上一篇',
        nextText: '下一篇',
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</body>
</html>
