<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="泪叶丝的个人博客，分享技术、生活和思考">
  <meta name="theme-color" content="#ffffff">
  <meta property="og:title" content="泪叶丝的个人博客">
  <meta property="og:description" content="探索网络技术, 记录生活点滴, 分享有趣思考">
  <meta name="robots" content="index, follow">
  <title>泪叶丝的个人博客</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://busuanzi.ibruce.info">
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="dns-prefetch" href="https://busuanzi.ibruce.info">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    body {
      background-image: linear-gradient(rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.6)), url('assets/1.png');
      background-attachment: fixed;
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    main, .content {
      background: transparent;
    }

    section.cover {
      background: rgba(255, 255, 255, 0.2);
    }

    section.cover.has-mask .mask {
      opacity: 0;
    }

    .markdown-section {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 12px;
      padding: 30px;
      margin-top: 20px;
    }

    .sidebar {
      position: relative;
      background-color: rgba(255, 255, 255, 0.6);
      border-right: none;
    }

    .cover-main h1, .cover-main p, .cover-main blockquote {
      color: #333;
      text-shadow: 0 1px 3px rgba(255, 255, 255, 0.8);
    }

    /* 使图片和文本自适应 */
    .markdown-section img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 20px auto;
    }

    .markdown-section p, .markdown-section li, .markdown-section blockquote {
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    @media (max-width: 768px) {
      .markdown-section {
        padding: 20px;
        margin-top: 10px;
      }
    }

    /* 封面统计样式 */
    .cover-stats {
      font-size: 0.9em;
      color: #666;
      margin-top: 30px;
      text-align: left;
      padding-left: 15px;
    }

    .cover-stats .stat-row {
      margin: 6px 0;
    }

    .cover-stats .stat-label {
      color: #888;
      margin-right: 6px;
    }

    .cover-stats .stat-value[aria-hidden="true"] {
      opacity: 0.6;
    }

    /* 侧边栏统计模块 */
    .sidebar-stats {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 15px;
      border-top: 1px solid rgba(0, 0, 0, 0.05);
      background: rgba(255, 255, 255, 0.3);
      font-size: 0.8em;
      color: #666;
    }

    .stats-container {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-icon {
      font-size: 1.2em;
      opacity: 0.8;
    }

    .stat-label {
      font-weight: 500;
      opacity: 0.8;
    }

    .stat-value {
      font-weight: 600;
      color: #333;
      min-width: 40px;
    }

    .stat-value[aria-hidden="true"] {
      opacity: 0.5;
    }

    /* 深色模式 */
    @media (prefers-color-scheme: dark) {
      .sidebar-stats {
        background: rgba(30, 30, 30, 0.4);
        border-top-color: rgba(255, 255, 255, 0.1);
        color: #aaa;
      }

      .stat-value {
        color: #e0e0e0;
      }
    }

    /* 手机端：768px 以下调整样式 - 居中显示在页面底部 */
    @media (max-width: 768px) {
      .sidebar-stats {
        position: fixed;
        bottom: 20px;
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        width: auto;
        padding: 12px 20px;
        border-top: none;
        border-radius: 20px;
        z-index: 100;
      }

      .stat-item {
        gap: 4px;
      }

      .stat-icon {
        font-size: 1em;
      }

      .stat-label {
        display: none;
      }

      .stats-container {
        gap: 15px;
      }
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: 'LAYYES',
      nameLink: '/', // 确保点击左上角名字跳转回根目录
      repo: 'worldfunction4/worldfunction4.github.io',
      loadSidebar: true,
      subMaxLevel: 3,
      coverpage: true,
      onlyCover: false, 
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      pagination: {
        previousText: '上一篇',
        nextText: '下一篇',
      },
      // 插件：当路由回到首页时，确保封面正常显示
      plugins: [
        function(hook, vm) {
          // 初始化统计模块
          hook.ready(function() {
            function injectStatistics() {
              const sidebar = document.querySelector('.sidebar');
              if (!sidebar || document.querySelector('.sidebar-stats')) return;

              const statsHtml = `
                <div class="sidebar-stats" role="status" aria-live="polite">
                  <div class="stats-container">
                    <div class="stat-item">
                      <span class="stat-icon">👁️</span>
                      <span class="stat-label">访问</span>
                      <span class="stat-value" id="sidebar-pv" aria-hidden="true">--</span>
                    </div>
                    <div class="stat-item">
                      <span class="stat-icon">👤</span>
                      <span class="stat-label">访客</span>
                      <span class="stat-value" id="sidebar-uv" aria-hidden="true">--</span>
                    </div>
                  </div>
                </div>
              `;

              sidebar.appendChild(document.createRange().createContextualFragment(statsHtml));

              // 更新缓存的数据
              updateStatistics();
            }

            function updateStatistics() {
              const pvEl = document.getElementById('sidebar-pv');
              const uvEl = document.getElementById('sidebar-uv');

              if (window._bszPV && pvEl) {
                pvEl.textContent = window._bszPV;
                pvEl.removeAttribute('aria-hidden');
              }
              if (window._bszUV && uvEl) {
                uvEl.textContent = window._bszUV;
                uvEl.removeAttribute('aria-hidden');
              }
            }

            setTimeout(injectStatistics, 100);
          });

          // 页面切换时更新统计数据
          hook.doneEach(function() {
            // 处理封面显示
            if (vm.route.path === '/' || vm.route.path === '/README') {
              const cover = document.querySelector('.cover');
              if (cover) cover.style.display = 'flex';

              // 更新封面统计数据
              const pv = document.getElementById('busuanzi_value_site_pv');
              const uv = document.getElementById('busuanzi_value_site_uv');
              if (pv && window._bszPV) {
                pv.textContent = window._bszPV;
                pv.removeAttribute('aria-hidden');
              }
              if (uv && window._bszUV) {
                uv.textContent = window._bszUV;
                uv.removeAttribute('aria-hidden');
              }
            }

            // 更新侧边栏统计数据
            const sidebarPv = document.getElementById('sidebar-pv');
            const sidebarUv = document.getElementById('sidebar-uv');
            if (sidebarPv && window._bszPV) {
              sidebarPv.textContent = window._bszPV;
              sidebarPv.removeAttribute('aria-hidden');
            }
            if (sidebarUv && window._bszUV) {
              sidebarUv.textContent = window._bszUV;
              sidebarUv.removeAttribute('aria-hidden');
            }
          });
        }
      ]
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>

  <script>
    (function() {
      var script = document.createElement('script');
      script.async = true;
      script.src = "https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js";
      script.crossOrigin = "anonymous";

      script.onerror = function() {
        console.warn('Busuanzi 脚本加载失败，尝试备用方案');
        loadBusuanziData();
      };

      script.onload = function() {
        setTimeout(function() {
          loadBusuanziData();
        }, 100);
      };

      function loadBusuanziData() {
        var startTime = Date.now();
        var check = function() {
          var pv = document.getElementById('busuanzi_value_site_pv');
          var uv = document.getElementById('busuanzi_value_site_uv');
          var pvVal = pv && pv.textContent.trim();
          var uvVal = uv && uv.textContent.trim();

          if (/^\d+$/.test(pvVal) && /^\d+$/.test(uvVal)) {
            window._bszPV = pvVal;
            window._bszUV = uvVal;
            if (pv) pv.removeAttribute('aria-hidden');
            if (uv) uv.removeAttribute('aria-hidden');
            updateSidebarStats();
          } else if (Date.now() - startTime < 15000) {
            setTimeout(check, 300);
          } else {
            console.warn('Busuanzi 数据加载超时');
          }
        };
        check();
      }

      function updateSidebarStats() {
        var sidebarPv = document.getElementById('sidebar-pv');
        var sidebarUv = document.getElementById('sidebar-uv');
        if (window._bszPV && sidebarPv) {
          sidebarPv.textContent = window._bszPV;
          sidebarPv.removeAttribute('aria-hidden');
        }
        if (window._bszUV && sidebarUv) {
          sidebarUv.textContent = window._bszUV;
          sidebarUv.removeAttribute('aria-hidden');
        }
      }

      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
