<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="泪叶丝的个人博客，分享技术、生活和思考">
  <meta name="theme-color" content="#ffffff">
  <meta property="og:title" content="泪叶丝的个人博客">
  <meta property="og:description" content="探索网络技术, 记录生活点滴, 分享有趣思考">
  <meta name="robots" content="index, follow">
  <title>泪叶丝的个人博客</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://busuanzi.ibruce.info">
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="dns-prefetch" href="https://busuanzi.ibruce.info">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    body {
      background-image: linear-gradient(rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.6)), url('assets/1.png');
      background-attachment: fixed;
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    main, .content {
      background: transparent;
    }

    section.cover {
      background: rgba(255, 255, 255, 0.2);
    }

    section.cover.has-mask .mask {
      opacity: 0;
    }

    .markdown-section {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 12px;
      padding: 30px;
      margin-top: 20px;
    }

    .sidebar {
      background-color: rgba(255, 255, 255, 0.6);
      border-right: none;
    }

    .cover-main h1, .cover-main p, .cover-main blockquote {
      color: #333;
      text-shadow: 0 1px 3px rgba(255, 255, 255, 0.8);
    }

    /* 使图片和文本自适应 */
    .markdown-section img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 20px auto;
    }

    .markdown-section p, .markdown-section li, .markdown-section blockquote {
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    @media (max-width: 768px) {
      .markdown-section {
        padding: 20px;
        margin-top: 10px;
      }
    }

    /* 封面统计样式 */
    .cover-stats {
      font-size: 0.9em;
      color: #666;
      margin-top: 30px;
      text-align: left;
      padding-left: 15px;
    }

    .cover-stats .stat-row {
      margin: 6px 0;
    }

    .cover-stats .stat-label {
      color: #888;
      margin-right: 6px;
    }

    .cover-stats .stat-value[aria-hidden="true"] {
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: 'LAYYES',
      nameLink: '/', // 确保点击左上角名字跳转回根目录
      repo: 'worldfunction4/worldfunction4.github.io',
      loadSidebar: true,
      subMaxLevel: 3,
      coverpage: true,
      onlyCover: false, 
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      pagination: {
        previousText: '上一篇',
        nextText: '下一篇',
      },
      // 插件：当路由回到首页时，确保封面正常显示
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            if (vm.route.path === '/' || vm.route.path === '/README') {
              const cover = document.querySelector('.cover');
              if (cover) cover.style.display = 'flex';
              // 封面重建后，将已缓存的统计数据填回新 DOM
              var pv = document.getElementById('busuanzi_value_site_pv');
              var uv = document.getElementById('busuanzi_value_site_uv');
              if (pv && window._bszPV) { pv.textContent = window._bszPV; pv.removeAttribute('aria-hidden'); }
              if (uv && window._bszUV) { uv.textContent = window._bszUV; uv.removeAttribute('aria-hidden'); }
            }
          });
        }
      ]
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>

  <script>
    (function() {
      var script = document.createElement('script');
      script.async = true;
      script.src = "https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js";
      script.crossOrigin = "anonymous";

      script.onload = function() {
        var startTime = Date.now();
        var check = function() {
          var pv = document.getElementById('busuanzi_value_site_pv');
          var uv = document.getElementById('busuanzi_value_site_uv');
          var pvVal = pv && pv.textContent.trim();
          var uvVal = uv && uv.textContent.trim();
          if (/^\d+$/.test(pvVal) && /^\d+$/.test(uvVal)) {
            window._bszPV = pvVal;
            window._bszUV = uvVal;
            pv.removeAttribute('aria-hidden');
            uv.removeAttribute('aria-hidden');
          } else if (Date.now() - startTime < 10000) {
            setTimeout(check, 300);
          }
        };
        setTimeout(check, 500);
      };

      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
