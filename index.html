<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="泪叶丝的个人博客，分享技术、生活和思考">
  <meta name="theme-color" content="#ffffff">
  <meta property="og:title" content="泪叶丝的个人博客">
  <meta property="og:description" content="探索网络技术, 记录生活点滴, 分享有趣思考">
  <meta name="robots" content="index, follow">
  <title>泪叶丝的个人博客</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    body {
      background-image: linear-gradient(rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.6)), url('assets/1.png');
      background-attachment: fixed;
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    main, .content {
      background: transparent;
    }

    section.cover {
      background: rgba(255, 255, 255, 0.2);
    }

    section.cover.has-mask .mask {
      opacity: 0;
    }

    .markdown-section {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 12px;
      padding: 30px;
      margin-top: 20px;
    }

    .sidebar {
      position: relative;
      background-color: rgba(255, 255, 255, 0.6);
      border-right: none;
    }

    .cover-main h1, .cover-main p, .cover-main blockquote {
      color: #333;
      text-shadow: 0 1px 3px rgba(255, 255, 255, 0.8);
    }

    /* 使图片和文本自适应 */
    .markdown-section img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 20px auto;
    }

    .markdown-section p, .markdown-section li, .markdown-section blockquote {
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    @media (max-width: 768px) {
      .markdown-section {
        padding: 20px;
        margin-top: 10px;
      }

      /* 移动端侧边栏修复：无论正文滚动到哪里，目录都应完整显示 */
      .sidebar {
        position: fixed !important;
        top: 0;
        bottom: 0;
        height: 100vh;
        max-height: 100vh;
        overflow-y: auto;
        z-index: 300;
      }

      .sidebar-toggle {
        z-index: 301;
      }
    }

    /* 封面访客统计模块 - 左下角固定 */
    .cover-stats {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 200;
      display: none; /* 默认隐藏，仅封面页显示 */
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 0.82em;
      color: #555;
      line-height: 1.8;
    }

    .cover-stats.visible {
      display: block;
    }

    .cover-stats .stat-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cover-stats .stat-label {
      opacity: 0.75;
    }

    .cover-stats .stat-value {
      font-weight: 600;
      color: #333;
    }

    .cover-stats .stat-value[aria-hidden="true"] {
      opacity: 0.5;
    }

    /* 深色模式适配 */
    @media (prefers-color-scheme: dark) {
      .cover-stats {
        background: rgba(20, 20, 20, 0.35);
        color: #bbb;
      }

      .cover-stats .stat-value {
        color: #e0e0e0;
      }
    }

    /* 手机端：居中显示在底部，不遮挡正文 */
    @media (max-width: 768px) {
      .cover-stats {
        left: 50%;
        transform: translateX(-50%);
        bottom: 16px;
        white-space: nowrap;
      }
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>

  <!-- 封面左下角访客统计 -->
  <div id="cover-stats" class="cover-stats" role="status" aria-live="polite">
    <div class="stat-row">
      <span class="stat-label">👁️ 访问：</span>
      <span id="busuanzi_value_site_pv" class="stat-value" aria-hidden="true">--</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">👤 访客：</span>
      <span id="busuanzi_value_site_uv" class="stat-value" aria-hidden="true">--</span>
    </div>
  </div>

  <script>
    window.$docsify = {
      name: 'LAYYES',
      nameLink: '/', // 确保点击左上角名字跳转回根目录
      repo: 'worldfunction4/worldfunction4.github.io',
      loadSidebar: true,
      subMaxLevel: 3,
      coverpage: true,
      onlyCover: false, 
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      pagination: {
        previousText: '上一篇',
        nextText: '下一篇',
      },
      // 插件：当路由回到首页时，确保封面正常显示
      plugins: [
        function(hook, vm) {
          // 页面切换时控制封面统计显示
          hook.doneEach(function() {
            const statsEl = document.getElementById('cover-stats');
            if (!statsEl) return;

            const isHome = vm.route.path === '/' || vm.route.path === '/README';
            if (isHome) {
              statsEl.classList.add('visible');
              // 更新数据
              const pv = document.getElementById('busuanzi_value_site_pv');
              const uv = document.getElementById('busuanzi_value_site_uv');
              if (pv && window._bszPV) {
                pv.textContent = window._bszPV;
                pv.removeAttribute('aria-hidden');
              }
              if (uv && window._bszUV) {
                uv.textContent = window._bszUV;
                uv.removeAttribute('aria-hidden');
              }
            } else {
              statsEl.classList.remove('visible');
            }
          });
        }
      ]
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>

  <script>
    // 简单的本地访问统计
    (function() {
      function initStats() {
        var stats = {
          pv: parseInt(localStorage.getItem('layyes_pv') || '0'),
          uv: parseInt(localStorage.getItem('layyes_uv') || '0')
        };

        stats.pv++;

        if (!sessionStorage.getItem('layyes_visited')) {
          stats.uv++;
          sessionStorage.setItem('layyes_visited', '1');
        }

        localStorage.setItem('layyes_pv', stats.pv);
        localStorage.setItem('layyes_uv', stats.uv);

        window._bszPV = String(stats.pv);
        window._bszUV = String(stats.uv);

        updateDisplay();
      }

      function updateDisplay() {
        var pv = document.getElementById('busuanzi_value_site_pv');
        var uv = document.getElementById('busuanzi_value_site_uv');

        if (pv) {
          pv.textContent = window._bszPV;
          pv.removeAttribute('aria-hidden');
        }
        if (uv) {
          uv.textContent = window._bszUV;
          uv.removeAttribute('aria-hidden');
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initStats);
      } else {
        initStats();
      }

      window.addEventListener('hashchange', function() {
        setTimeout(updateDisplay, 100);
      });
    })();
  </script>
</body>
</html>
