<!DOCTYPE html>
<html lang="zh-CN">
<style>
  /* 全局背景：固定且不随滚动条移动 */
  body {
    background-image:linear-gradient(rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.6)),url('assets/1.png') !important;
    background-attachment: fixed !important; /* 固定背景 */
    background-repeat: no-repeat !important;
    background-size: cover !important;        /* 铺满屏幕 */
    background-position: center !important;
  }

  /* 封面层透明化：露出底下的 body 背景 */
  section.cover {
    background: rgba(255, 255, 255, 0.9) !important; 
  }

  /* 去掉封面自带的背景图，防止重叠 */
  section.cover.has-mask .mask {
    opacity: 0 !important;
  }

  /* 内容区域透明感 */
  .markdown-section {
    background: rgba(255, 255, 255, 0.9) !important;
    border-radius: 12px;
    padding: 30px !important;
    margin-top: 20px;
  }

  /* 侧边栏半透明 */
  .sidebar {
    background-color: rgba(255, 255, 255, 0.7) !important;
  }
  .cover-main h1, .cover-main p, .cover-main blockquote {
    color: #333 !important; /* 深灰色文字 */
    text-shadow: 0 1px 3px rgba(255,255,255,0.8); /* 白色文字阴影，增加对比度 */
}
  /* 强制让最底层的容器透明，否则它会挡住 body 的背景图 */
main, .content {
    background: transparent !important;
}

/* 针对封面背景的彻底透明 */
section.cover {
    background: rgba(255, 255, 255, 0.2) !important; 
}
</style>
  <meta charset="UTF-8">
  <title>LAYYES | 泪叶丝的个人博客</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: 'LAYYES',           // 左上角名称
      repo: 'worldfunction4/worldfunction4.github.io', // 挂上 GitHub 图标
      loadSidebar: true,        // 开启侧边栏
      subMaxLevel: 3,           // 目录层级
      coverpage: true,
      onlyCover: false,
      coverpage: true,          // 开启封面
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      pagination: {             // 翻页功能
        previousText: '上一篇',
        nextText: '下一篇',
      },
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
