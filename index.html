<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="泪叶丝的个人博客，分享技术、生活和思考">
  <title>泪叶丝的个人博客</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    body {
      background-image: linear-gradient(rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.6)), url('assets/1.png');
      background-attachment: fixed;
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      overflow-x: hidden;
    }

    main, .content {
      background: transparent;
    }

    section.cover {
      background: rgba(255, 255, 255, 0.2);
    }

    section.cover.has-mask .mask {
      opacity: 0;
    }

    .markdown-section {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 12px;
      padding: 30px;
      margin-top: 20px;
    }

    .sidebar {
      background-color: rgba(255, 255, 255, 0.6);
      border-right: none;
    }

    .cover-main h1, .cover-main p, .cover-main blockquote {
      color: #333;
      text-shadow: 0 1px 3px rgba(255, 255, 255, 0.8);
    }

    /* 使图片和文本自适应 */
    .markdown-section img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 20px auto;
    }

    .markdown-section p, .markdown-section li, .markdown-section blockquote {
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    @media (max-width: 768px) {
      .markdown-section {
        padding: 20px;
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: 'LAYYES',
      nameLink: '/', // 确保点击左上角名字跳转回根目录
      repo: 'worldfunction4/worldfunction4.github.io',
      loadSidebar: true,
      subMaxLevel: 3,
      coverpage: true,
      onlyCover: false, 
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      pagination: {
        previousText: '上一篇',
        nextText: '下一篇',
      },
      // 插件：当路由回到首页时，确保封面正常显示
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            if (vm.route.path === '/' || vm.route.path === '/README') {
              const cover = document.querySelector('.cover');
              if (cover) cover.style.display = 'flex';
            }
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>

  <script>
    (function() {
      // 检查当前会话是否已经加载过统计脚本
      if (!sessionStorage.getItem('busuanzi_locked')) {
        var script = document.createElement('script');
        script.async = true;
        script.src = "//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js";
        document.body.appendChild(script);
        // 锁定，直到关闭浏览器窗口/标签页
        sessionStorage.setItem('busuanzi_locked', 'true');
      }
    })();
  </script>
</body>
</html>
